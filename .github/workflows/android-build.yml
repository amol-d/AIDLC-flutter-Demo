# Android is the slow lane, so it runs on its own — only on PRs promoting toward a
# release branch (base = preprod or main). The base-branch filter lives on the
# trigger, not in a job `if`, so on every other PR/push this workflow simply does
# not start (no confusing "skipped" build-android check on the commit). Feature PRs
# into `dev` stay fast; ci.yml still covers analyze/test/web everywhere.
name: Android build

on:
  pull_request:
    branches: [preprod, main]

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-android:
    name: build-android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: ./.github/actions/flutter-setup
      - name: Build app1 (debug APK, dev flavor)
        working-directory: app/app1
        run: flutter build apk --debug --flavor dev --dart-define FLAVOR=dev
