name: CI

on:
  pull_request:
    branches: [dev, preprod, main]
  push:
    branches: [dev, preprod, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze-test:
    name: analyze-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/flutter-setup
      - name: Analyze (fatal infos)
        run: dart run melos run analyze
      - name: Unit & widget tests
        run: dart run melos run test:unit

  build-web:
    name: build-web
    needs: analyze-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/flutter-setup
      - name: Build app1 (web)
        working-directory: app/app1
        run: flutter build web --release --dart-define FLAVOR=dev
      - name: Build app2 (web)
        working-directory: app/app2
        run: flutter build web --release --dart-define FLAVOR=dev

  # Android is the slow lane and lives in its own workflow (android-build.yml),
  # gated at the trigger level to PRs into preprod/main. Keeping it out of this
  # matrix avoids a redundant "skipped" build-android check on push runs, where
  # the whole CI workflow also fires.
