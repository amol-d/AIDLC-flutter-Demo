name: CI

on:
  pull_request:
    branches: [dev, preprod, main]
  push:
    branches: [dev, preprod, main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze-test:
    name: analyze-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/flutter-setup
      - name: Analyze (fatal infos)
        run: dart run melos run analyze
      - name: Unit & widget tests
        run: dart run melos run test:unit

  build-web:
    name: build-web
    needs: analyze-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/flutter-setup
      - name: Build app1 (web)
        working-directory: app/app1
        run: flutter build web --release --dart-define FLAVOR=dev
      - name: Build app2 (web)
        working-directory: app/app2
        run: flutter build web --release --dart-define FLAVOR=dev

  # Android is the slow lane; run it only when promoting toward release branches.
  build-android:
    name: build-android
    needs: analyze-test
    if: github.event_name == 'pull_request' && (github.base_ref == 'preprod' || github.base_ref == 'main')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: ./.github/actions/flutter-setup
      - name: Build app1 (debug APK, dev flavor)
        working-directory: app/app1
        run: flutter build apk --debug --flavor dev --dart-define FLAVOR=dev
