# AIDLC metrics: weekly snapshot of lifecycle health (lead time to merge into
# dev, PR merge success rate) written to the workflow run summary.
name: AIDLC metrics

on:
  schedule:
    - cron: "0 7 * * 1" # weekly Monday 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Compute metrics (last 30 days)
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'PY'
          import json, os, subprocess, datetime as dt
          repo = os.environ["REPO"]
          def gh(args):
              return json.loads(subprocess.check_output(["gh"] + args, text=True))
          since = dt.datetime.now(dt.timezone.utc) - dt.timedelta(days=30)
          # PRs targeting dev, recently updated.
          prs = gh(["pr", "list", "-R", repo, "--base", "dev", "--state", "all",
                    "--limit", "200", "--json",
                    "number,createdAt,mergedAt,closedAt,state"])
          merged, closed_unmerged, lead_hours = 0, 0, []
          for p in prs:
              closed = p.get("closedAt") or p.get("mergedAt")
              if not closed:
                  continue
              if dt.datetime.fromisoformat(closed.replace("Z", "+00:00")) < since:
                  continue
              if p.get("mergedAt"):
                  merged += 1
                  c = dt.datetime.fromisoformat(p["createdAt"].replace("Z", "+00:00"))
                  m = dt.datetime.fromisoformat(p["mergedAt"].replace("Z", "+00:00"))
                  lead_hours.append((m - c).total_seconds() / 3600)
              elif p["state"].lower() == "closed":
                  closed_unmerged += 1
          total = merged + closed_unmerged
          success = (merged / total * 100) if total else 0
          avg_lead = (sum(lead_hours) / len(lead_hours)) if lead_hours else 0
          summary = os.environ["GITHUB_STEP_SUMMARY"]
          with open(summary, "w") as f:
              f.write("## AIDLC metrics (last 30 days)\n\n")
              f.write("| Metric | Value |\n|---|---|\n")
              f.write(f"| PRs merged into dev | {merged} |\n")
              f.write(f"| PR merge success rate | {success:.0f}% ({merged}/{total}) |\n")
              f.write(f"| Avg lead time to merge | {avg_lead:.1f} h |\n")
          print("Wrote AIDLC metrics to the run summary.")
          PY
