# AIDLC (Anthropic path): mention @claude in an issue or PR and the agent plans,
# implements, tests, and opens/updates a PR — following CLAUDE.md and .claude/skills/*.
# OPTIONAL: requires ANTHROPIC_API_KEY secret + the Claude GitHub App installed;
# skips cleanly when the key is absent (the active dev path is codex.yml / @codex).
name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  check:
    # Only trusted authors (repo owner / member / collaborator) can trigger the
    # agent — stops arbitrary users from driving it via crafted issue/PR text.
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.review.author_association)) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.issue.author_association))
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: echo "run=${{ secrets.ANTHROPIC_API_KEY != '' }}" >> "$GITHUB_OUTPUT"

  claude:
    needs: check
    if: needs.check.outputs.run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      # Prefer a GitHub App token so PRs the agent opens trigger CI + AI review
      # (the default GITHUB_TOKEN is muted by GitHub's anti-recursion rule).
      # Skipped when the App is not configured; falls back to a PAT or the token.
      - name: Generate bot app token
        id: bot-token
        if: ${{ secrets.AIDLC_BOT_APP_ID != '' }}
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.AIDLC_BOT_APP_ID }}
          private-key: ${{ secrets.AIDLC_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.bot-token.outputs.token || secrets.AIDLC_BOT_TOKEN || github.token }}

      # Give the agent a working toolchain so it can run the repo's
      # verification loop (melos gen/analyze/test) before pushing.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: ./.github/actions/flutter-setup

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Bot identity so PRs the agent opens trigger CI + AI review.
          github_token: ${{ steps.bot-token.outputs.token || secrets.AIDLC_BOT_TOKEN || github.token }}
          claude_args: |
            --allowedTools "Bash(dart:*),Bash(flutter:*),Bash(fvm:*),Bash(melos:*),Bash(git:*),Bash(gh:*)"
        env:
          # Optional: available to any OpenAI-backed tooling the agent is asked to use.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
