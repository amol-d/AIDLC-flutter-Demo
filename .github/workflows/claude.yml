# AIDLC (Anthropic path): mention @claude in an issue or PR and the agent plans,
# implements, tests, and opens/updates a PR — following CLAUDE.md and .claude/skills/*.
# OPTIONAL: requires ANTHROPIC_API_KEY secret + the Claude GitHub App installed;
# skips cleanly when the key is absent (the active dev path is codex.yml / @codex).
name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  check:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check.outputs.run }}
    steps:
      - id: check
        run: echo "run=${{ secrets.ANTHROPIC_API_KEY != '' }}" >> "$GITHUB_OUTPUT"

  claude:
    needs: check
    if: needs.check.outputs.run == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Give the agent a working toolchain so it can run the repo's
      # verification loop (melos gen/analyze/test) before pushing.
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: ./.github/actions/flutter-setup

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --allowedTools "Bash(dart:*),Bash(flutter:*),Bash(fvm:*),Bash(melos:*),Bash(git:*),Bash(gh:*)"
        env:
          # Optional: available to any OpenAI-backed tooling the agent is asked to use.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
