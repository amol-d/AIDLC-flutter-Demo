# PROD deploy: fires on every merge to `main`.
# Skips cleanly until Firebase secrets exist (Documentation/setup/firebase-setup.md).
name: Deploy PROD

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  checks: write

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.check.outputs.web }}
      android: ${{ steps.check.outputs.android }}
      signing: ${{ steps.check.outputs.signing }}
    steps:
      - id: check
        run: |
          echo "web=${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' && secrets.FIREBASE_PROJECT_ID != '' }}" >> "$GITHUB_OUTPUT"
          echo "android=${{ secrets.FIREBASE_SERVICE_ACCOUNT != '' && secrets.FIREBASE_PROJECT_ID != '' && secrets.FIREBASE_ANDROID_APP_ID_PROD != '' }}" >> "$GITHUB_OUTPUT"
          echo "signing=${{ secrets.ANDROID_KEYSTORE_BASE64 != '' && secrets.ANDROID_KEYSTORE_PASSWORD != '' && secrets.ANDROID_KEY_PASSWORD != '' && secrets.ANDROID_KEY_ALIAS != '' }}" >> "$GITHUB_OUTPUT"

  deploy-web:
    needs: check-secrets
    if: needs.check-secrets.outputs.web == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/flutter-setup
      - name: Build app1 web (PROD)
        working-directory: app/app1
        run: flutter build web --release --dart-define FLAVOR=prod
      - name: Deploy to Firebase Hosting (app1-prod)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          channelId: live
          target: app1-prod

  # Post-deploy smoke: verify PROD actually serves the app. On failure the
  # rollback job opens an automated revert PR.
  smoke-web:
    needs: deploy-web
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test the PROD site
        env:
          URL: ${{ vars.SMOKE_URL_PROD || 'https://app1-prod.web.app' }}
        run: |
          echo "Smoke testing $URL"
          for i in 1 2 3 4 5; do
            CODE=$(curl -sS -o "$RUNNER_TEMP/index.html" -w '%{http_code}' -L --max-time 20 "$URL" || echo 000)
            if [ "$CODE" = "200" ]; then break; fi
            echo "attempt $i: HTTP $CODE — retrying"; sleep 10
          done
          [ "$CODE" = "200" ] || { echo "::error::PROD smoke failed: HTTP $CODE from $URL"; exit 1; }
          if ! grep -qE 'flutter_bootstrap\.js|main\.dart\.js|flutter\.js' "$RUNNER_TEMP/index.html"; then
            echo "::error::PROD smoke failed: $URL served 200 but no Flutter bootstrap found"; exit 1
          fi
          echo "✅ PROD smoke passed ($URL serves the app)"

  # Automated rollback: if the PROD smoke fails, open a revert PR against main
  # (direct pushes to protected main aren't allowed — a human merges the revert).
  rollback:
    needs: smoke-web
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.AIDLC_BOT_TOKEN || github.token }}
      - name: Open automated rollback (revert) PR
        env:
          GH_TOKEN: ${{ secrets.AIDLC_BOT_TOKEN || github.token }}
        run: |
          git config user.name "codex-bot"
          git config user.email "codex-bot@users.noreply.github.com"
          BR="rollback/prod-${GITHUB_SHA::7}"
          git checkout -b "$BR"
          # Revert the deployed commit (merge commit -> mainline parent, else plain).
          git revert --no-edit -m 1 "$GITHUB_SHA" || git revert --no-edit "$GITHUB_SHA"
          git push -u origin "$BR"
          gh pr create --base main --head "$BR" \
            --title "revert: PROD smoke failed for ${GITHUB_SHA::7}" \
            --body "🚨 Automated rollback — the PROD post-deploy smoke test failed. This reverts the deployed change to restore the last-good state. Review and merge to complete the rollback."

  deploy-android:
    needs: check-secrets
    if: needs.check-secrets.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: ./.github/actions/flutter-setup
      # Reconstruct the upload keystore + key.properties from secrets so the release
      # APK is signed with the real key. Skips when signing secrets are absent, in
      # which case build.gradle.kts falls back to the debug key (build still works).
      # See Documentation/setup/android-signing.md.
      - name: Restore signing config from secrets
        if: needs.check-secrets.outputs.signing == 'true'
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_B64" | base64 --decode > "$RUNNER_TEMP/upload-keystore.jks"
          cat > app/app1/android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=$RUNNER_TEMP/upload-keystore.jks
          EOF
      - name: Build app1 APK (PROD flavor -> com.example.app1)
        working-directory: app/app1
        run: flutter build apk --release --flavor prod --dart-define FLAVOR=prod
      - name: Distribute via Firebase App Distribution
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/firebase-sa.json"
          export GOOGLE_APPLICATION_CREDENTIALS="$RUNNER_TEMP/firebase-sa.json"
          npx -y firebase-tools appdistribution:distribute \
            app/app1/build/app/outputs/flutter-apk/app-prod-release.apk \
            --app "${{ secrets.FIREBASE_ANDROID_APP_ID_PROD }}" \
            --project "${{ secrets.FIREBASE_PROJECT_ID }}" \
            --groups testers \
            --release-notes "PROD ${GITHUB_SHA::7} (${GITHUB_REF_NAME})"
