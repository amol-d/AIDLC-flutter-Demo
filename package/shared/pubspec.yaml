name: shared
description: Shared constants, exceptions, helpers, and localization for the AIDLC demo monorepo.
version: 1.0.0
publish_to: none

environment:
  sdk: ">=3.9.0 <4.0.0"
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter
  get_it: ^9.2.1
  injectable: ^2.4.2
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  injectable_generator: ^2.6.2
  flutter_lints: ^5.0.0
  intl_utils: ^2.8.10

flutter_intl:
  enabled: true
  class_name: S
  main_locale: en
  arb_dir: lib/l10n
  output_dir: lib/src/generated
