name: app1
description: AIDLC demo application 1 - login and home with deeplinks, web slugs, and flavors.
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.9.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  app_links: ^6.3.0
  auto_route: ^9.2.2
  data:
    path: ../../package/data
  domain:
    path: ../../package/domain
  flutter_bloc: ^8.1.6
  freezed_annotation: ^2.4.4
  get_it: ^7.7.0
  injectable: ^2.4.2
  intl: ^0.20.2
  shared:
    path: ../../package/shared

dev_dependencies:
  flutter_test:
    sdk: flutter
  auto_route_generator: ^9.0.0
  bloc_test: ^9.1.7
  build_runner: ^2.4.11
  flutter_flavorizr: ^2.2.3
  flutter_lints: ^5.0.0
  flutter_native_splash: ^2.4.1
  freezed: ^2.5.7
  injectable_generator: ^2.6.2
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

# Native splash screens (Android + iOS). Regenerate after changes with:
#   dart run flutter_native_splash:create
flutter_native_splash:
  color: "#0D47A1"
  color_dark: "#0D1B2A"
  android_12:
    color: "#0D47A1"
    color_dark: "#0D1B2A"
  web: false

# Native flavors (Android productFlavors + iOS schemes/xcconfigs).
# Regenerate after changes with: dart run flutter_flavorizr
# Only native processors run - the Dart entrypoint stays lib/main.dart and the
# runtime Flavor still comes from EnvConstants (dart-define/appFlavor).
flavorizr:
  instructions:
    - android:androidManifest
    - android:flavorizrGradle
    - android:buildGradle
    - ios:xcconfig
    - ios:buildTargets
    - ios:schema
    - ios:plist
  flavors:
    dev:
      app:
        name: "App1 DEV"
      android:
        applicationId: "com.example.app1.dev"
      ios:
        bundleId: "com.example.app1.dev"
    preprod:
      app:
        name: "App1 PREPROD"
      android:
        applicationId: "com.example.app1.preprod"
      ios:
        bundleId: "com.example.app1.preprod"
    prod:
      app:
        name: "App1"
      android:
        applicationId: "com.example.app1"
      ios:
        bundleId: "com.example.app1"
